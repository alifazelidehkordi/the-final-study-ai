name: Cross-Platform GUI

on:
  push:
    branches:
      - main
      - feature/cross-platform-gui
  pull_request:

concurrency:
  group: cross-platform-gui-${{ github.ref }}
  cancel-in-progress: true

env:
  QT_QPA_PLATFORM: offscreen
  QT_SCALE_FACTOR: "1"

jobs:
  quality:
    name: Quality (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements/dev-lock.txt
            requirements/gui-lock.txt

      - name: Install Linux Qt dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libglib2.0-0 \
            libxkbcommon0 \
            libxcb-cursor0 \
            libxcb-xinerama0 \
            libdbus-1-3

      - name: Install locked dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/dev-lock.txt
          python -m pip install -e .

      - name: Run quality gates
        shell: bash
        run: bash scripts/ci/run_quality_gates.sh

  package:
    name: Package (${{ matrix.os }})
    needs: quality
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements/dev-lock.txt
            requirements/gui-lock.txt

      - name: Install Linux Qt dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libglib2.0-0 \
            libxkbcommon0 \
            libxcb-cursor0 \
            libxcb-xinerama0 \
            libdbus-1-3

      - name: Install locked dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/dev-lock.txt
          python -m pip install -e .

      - name: Validate deploy configuration
        shell: bash
        run: |
          pyside6-deploy gui/__main__.py \
            -c packaging/pysidedeploy.spec \
            --dry-run \
            -f

      - name: Build standalone package
        shell: bash
        run: |
          pyside6-deploy gui/__main__.py \
            -c packaging/pysidedeploy.spec \
            --keep-deployment-files \
            -f

      - name: Record package sizes
        if: always()
        shell: bash
        run: python scripts/ci/record_package_sizes.py

      - name: Upload package artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gui-package-${{ matrix.os }}
          path: |
            dist/**
            gui/deployment/**
          if-no-files-found: ignore